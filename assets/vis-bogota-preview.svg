<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Map polygon shapes (abstract Bogotá neighborhoods) -->
  <polygon points="200,120 280,100 360,130 340,200 260,220 190,180" fill="#0f3460" opacity="0.7" stroke="#4fc3f7" stroke-width="1.5"/>
  <polygon points="340,200 360,130 440,150 460,230 380,250" fill="#1a237e" opacity="0.8" stroke="#4fc3f7" stroke-width="1.5"/>
  <polygon points="190,180 260,220 240,300 160,310 150,240" fill="#4a148c" opacity="0.6" stroke="#ce93d8" stroke-width="1.5"/>
  <polygon points="260,220 340,200 380,250 360,320 280,330 240,300" fill="#311b92" opacity="0.75" stroke="#b39ddb" stroke-width="1.5"/>
  <polygon points="380,250 460,230 500,290 470,360 390,370 360,320" fill="#1565c0" opacity="0.7" stroke="#4fc3f7" stroke-width="1.5"/>
  <polygon points="460,230 540,200 580,260 540,320 500,290" fill="#6a1b9a" opacity="0.65" stroke="#ce93d8" stroke-width="1.5"/>
