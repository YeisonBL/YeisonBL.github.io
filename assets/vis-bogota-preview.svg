  <circle cx="608" cy="315" r="5" fill="#ffa726" opacity="0.8"/>
  <text x="620" y="319" fill="#ffffff60" font-family="monospace" font-size="9">Zona mixta</text>
  <!-- Title -->
  <text x="40" y="390" fill="#ffffff" font-family="sans-serif" font-size="18" font-weight="bold">Segregación VIS · Bogotá</text>
  <text x="40" y="415" fill="#4fc3f7" font-family="monospace" font-size="12">Análisis geoespacial · Índices de segregación · Python</text>
