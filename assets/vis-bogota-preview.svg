  <circle cx="290" cy="170" r="18" fill="#ef5350" opacity="0.5"/>
  <circle cx="290" cy="170" r="10" fill="#ef5350" opacity="0.7"/>
  <circle cx="420" cy="210" r="14" fill="#ff7043" opacity="0.5"/>
  <circle cx="420" cy="210" r="7" fill="#ff7043" opacity="0.7"/>
  <circle cx="340" cy="280" r="22" fill="#e53935" opacity="0.45"/>
  <circle cx="340" cy="280" r="12" fill="#e53935" opacity="0.65"/>
  <circle cx="480" cy="280" r="12" fill="#ffa726" opacity="0.5"/>
  <circle cx="480" cy="280" r="6" fill="#ffa726" opacity="0.7"/>
  <circle cx="220" cy="250" r="10" fill="#66bb6a" opacity="0.5"/>
  <circle cx="220" cy="250" r="5" fill="#66bb6a" opacity="0.7"/>
  <!-- Right panel -->
  <rect x="580" y="80" width="180" height="290" rx="8" fill="#ffffff06" stroke="#ffffff15" stroke-width="1"/>
  <text x="670" y="115" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="11" font-weight="bold">ÍNDICES</text>
  <text x="600" y="145" fill="#ffffff80" font-family="monospace" font-size="10">Disimilitud</text>
  <rect x="600" y="152" width="140" height="6" rx="3" fill="#ffffff15"/>
  <rect x="600" y="152" width="98" height="6" rx="3" fill="#4fc3f7"/>
  <text x="745" y="160" fill="#4fc3f7" font-family="monospace" font-size="10">0.70</text>
  <text x="600" y="185" fill="#ffffff80" font-family="monospace" font-size="10">Exposición</text>
  <rect x="600" y="192" width="140" height="6" rx="3" fill="#ffffff15"/>
  <rect x="600" y="192" width="62" height="6" rx="3" fill="#ce93d8"/>
  <text x="745" y="200" fill="#ce93d8" font-family="monospace" font-size="10">0.44</text>
  <text x="600" y="225" fill="#ffffff80" font-family="monospace" font-size="10">Moran's I</text>
  <rect x="600" y="232" width="140" height="6" rx="3" fill="#ffffff15"/>
  <rect x="600" y="232" width="112" height="6" rx="3" fill="#66bb6a"/>
  <text x="745" y="240" fill="#66bb6a" font-family="monospace" font-size="10">0.80</text>
