  <rect x="60" y="115" width="120" height="6" rx="3" fill="#4fc3f7" opacity="0.6"/>
  <rect x="60" y="130" width="150" height="5" rx="3" fill="#ffffff20"/>
  <rect x="60" y="143" width="130" height="5" rx="3" fill="#ffffff20"/>
  <rect x="60" y="156" width="145" height="5" rx="3" fill="#ffffff20"/>
  <rect x="60" y="169" width="100" height="5" rx="3" fill="#ffffff20"/>
  <rect x="60" y="192" width="80" height="6" rx="3" fill="#66bb6a" opacity="0.6"/>
  <rect x="60" y="207" width="140" height="5" rx="3" fill="#ffffff20"/>
  <rect x="60" y="220" width="120" height="5" rx="3" fill="#ffffff20"/>
  <rect x="60" y="233" width="155" height="5" rx="3" fill="#ffffff20"/>
