  <rect x="60" y="284" width="110" height="5" rx="3" fill="#ffffff20"/>
  <!-- Arrow 1 -->
  <line x1="250" y1="190" x2="300" y2="190" stroke="#4fc3f7" stroke-width="2"/>
  <polygon points="300,185 310,190 300,195" fill="#4fc3f7"/>
  <!-- Center: LLM box -->
  <rect x="310" y="130" width="180" height="120" rx="8" fill="#0f3460" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="400" y="165" text-anchor="middle" fill="#4fc3f7" font-family="monospace" font-size="13" font-weight="bold">LLM</text>
  <text x="400" y="185" text-anchor="middle" fill="#ffffff80" font-family="monospace" font-size="10">↑ CV base</text>
  <text x="400" y="205" text-anchor="middle" fill="#ffffff80" font-family="monospace" font-size="10">↑ Oferta keywords</text>
  <text x="400" y="225" text-anchor="middle" fill="#66bb6a" font-family="monospace" font-size="10">→ secciones a resaltar</text>
  <!-- Spinning indicator -->
  <circle cx="400" cy="248" r="10" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="20 12"/>
  <!-- Arrow 2 -->
  <line x1="490" y1="190" x2="540" y2="190" stroke="#4fc3f7" stroke-width="2"/>
  <polygon points="540,185 550,190 540,195" fill="#4fc3f7"/>
  <!-- Right: Output CV -->
  <rect x="560" y="60" width="200" height="260" rx="6" fill="#1e2d3d" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="660" y="90" text-anchor="middle" fill="#66bb6a" font-family="monospace" font-size="11" font-weight="bold">cv_adaptado.tex</text>
  <line x1="580" y1="100" x2="740" y2="100" stroke="#2d4a6a" stroke-width="1"/>
  <rect x="580" y="115" width="110" height="6" rx="3" fill="#66bb6a" opacity="0.8"/>
  <rect x="580" y="130" width="150" height="5" rx="3" fill="#66bb6a" opacity="0.35"/>
  <rect x="580" y="143" width="130" height="5" rx="3" fill="#66bb6a" opacity="0.35"/>
  <rect x="580" y="156" width="145" height="5" rx="3" fill="#66bb6a" opacity="0.35"/>
  <rect x="580" y="169" width="120" height="5" rx="3" fill="#66bb6a" opacity="0.35"/>
  <rect x="580" y="192" width="80" height="6" rx="3" fill="#4fc3f7" opacity="0.8"/>
  <rect x="580" y="207" width="140" height="5" rx="3" fill="#4fc3f7" opacity="0.35"/>
  <rect x="580" y="220" width="110" height="5" rx="3" fill="#4fc3f7" opacity="0.35"/>
  <rect x="580" y="233" width="155" height="5" rx="3" fill="#4fc3f7" opacity="0.35"/>
  <rect x="580" y="256" width="90" height="6" rx="3" fill="#ce93d8" opacity="0.8"/>
  <rect x="580" y="271" width="130" height="5" rx="3" fill="#ffffff20"/>
  <rect x="580" y="284" width="110" height="5" rx="3" fill="#ffffff20"/>
  <!-- Time comparison -->
  <rect x="200" y="355" width="170" height="50" rx="6" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
  <text x="285" y="376" text-anchor="middle" fill="#ef5350" font-family="sans-serif" font-size="12">Antes: ~45 min</text>
  <text x="285" y="395" text-anchor="middle" fill="#ef5350" font-family="monospace" font-size="18" font-weight="bold">✗</text>
  <rect x="430" y="355" width="170" height="50" rx="6" fill="#ffffff08" stroke="#66bb6a" stroke-width="1"/>
  <text x="515" y="376" text-anchor="middle" fill="#66bb6a" font-family="sans-serif" font-size="12">Ahora: ~30 seg</text>
  <text x="515" y="395" text-anchor="middle" fill="#66bb6a" font-family="monospace" font-size="18" font-weight="bold">✓</text>
  <!-- Title -->
  <text x="40" y="430" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">Actualizador de CV con IA</text>
  <text x="400" y="430" fill="#4fc3f7" font-family="monospace" font-size="11">NLP · LLMs · Python · LaTeX</text>
